name: price-monitor

services:
  postgres:
    image: postgres
    container_name: price-monitor-postgres
    environment:
      POSTGRES_DB: price-monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - price-monitor_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  price-monitor_postgres_data:
